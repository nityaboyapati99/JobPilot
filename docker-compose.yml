version: "3.9"

networks:
  jobpilot-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  minio_data:

services:

  # ──────────────────────────────────────────────
  # DATABASE — PostgreSQL + pgvector
  # ──────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: jobpilot-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-jobpilot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-jobpilot123}
      POSTGRES_DB: ${POSTGRES_DB:-jobpilot_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/docker/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - jobpilot-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jobpilot"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────────
  # CACHE — Redis
  # ──────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: jobpilot-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - jobpilot-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────────
  # OBJECT STORAGE — MinIO (S3-compatible)
  # ──────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: jobpilot-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
    ports:
      - "9000:9000"   # API
      - "9001:9001"   # Console UI
    volumes:
      - minio_data:/data
    networks:
      - jobpilot-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────────
  # AUTH SERVICE
  # ──────────────────────────────────────────────
  auth:
    build:
      context: ./services/auth
      dockerfile: Dockerfile
    container_name: jobpilot-auth
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      DATABASE_URL: postgresql://jobpilot:jobpilot123@postgres:5432/jobpilot_db
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-supersecretkey_changeme}
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 60
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - jobpilot-network

  # ──────────────────────────────────────────────
  # JD ANALYZER SERVICE
  # ──────────────────────────────────────────────
  jd-analyzer:
    build:
      context: ./services/jd-analyzer
      dockerfile: Dockerfile
    container_name: jobpilot-jd-analyzer
    restart: unless-stopped
    ports:
      - "8002:8002"
    environment:
      DATABASE_URL: postgresql://jobpilot:jobpilot123@postgres:5432/jobpilot_db
      REDIS_URL: redis://redis:6379
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      AUTH_SERVICE_URL: http://auth:8001
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - jobpilot-network

  # ──────────────────────────────────────────────
  # RESUME GENERATOR SERVICE
  # ──────────────────────────────────────────────
  resume-generator:
    build:
      context: ./services/resume-generator
      dockerfile: Dockerfile
    container_name: jobpilot-resume-generator
    restart: unless-stopped
    ports:
      - "8003:8003"
    environment:
      DATABASE_URL: postgresql://jobpilot:jobpilot123@postgres:5432/jobpilot_db
      REDIS_URL: redis://redis:6379
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin123}
      AUTH_SERVICE_URL: http://auth:8001
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - jobpilot-network

  # ──────────────────────────────────────────────
  # APPLICATION TRACKER SERVICE
  # ──────────────────────────────────────────────
  tracker:
    build:
      context: ./services/tracker
      dockerfile: Dockerfile
    container_name: jobpilot-tracker
    restart: unless-stopped
    ports:
      - "8004:8004"
    environment:
      DATABASE_URL: postgresql://jobpilot:jobpilot123@postgres:5432/jobpilot_db
      REDIS_URL: redis://redis:6379
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      AUTH_SERVICE_URL: http://auth:8001
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - jobpilot-network

  # ──────────────────────────────────────────────
  # SKILL INTELLIGENCE SERVICE
  # ──────────────────────────────────────────────
  skill-intelligence:
    build:
      context: ./services/skill-intelligence
      dockerfile: Dockerfile
    container_name: jobpilot-skill-intelligence
    restart: unless-stopped
    ports:
      - "8005:8005"
    environment:
      DATABASE_URL: postgresql://jobpilot:jobpilot123@postgres:5432/jobpilot_db
      REDIS_URL: redis://redis:6379
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      AUTH_SERVICE_URL: http://auth:8001
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - jobpilot-network

  # ──────────────────────────────────────────────
  # FRONTEND — React
  # ──────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: jobpilot-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      VITE_AUTH_URL: http://localhost:8001
      VITE_JD_ANALYZER_URL: http://localhost:8002
      VITE_RESUME_URL: http://localhost:8003
      VITE_TRACKER_URL: http://localhost:8004
      VITE_SKILL_URL: http://localhost:8005
    depends_on:
      - auth
    networks:
      - jobpilot-network

  # Observability (Grafana + Prometheus) — added later
